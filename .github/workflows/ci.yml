name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      # ── Pull Request → build unsigned APK to validate the code ──────────────
      - name: Build APK (PR check)
        if: github.event_name == 'pull_request'
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload APK artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ScorePad-pr${{ github.event.pull_request.number }}.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      # ── Merge to main → build signed AAB for Play Store ─────────────────────
      - name: Write key.properties
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/scorepad-upload-key.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=scorepad
          storeFile=/tmp/scorepad-upload-key.jks
          EOF

      - name: Build signed AAB
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ScorePad-release.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
